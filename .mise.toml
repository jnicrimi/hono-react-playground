[tools]
pnpm = "11.4.0"
node = "24.16.0"
actionlint = "1.7.12"
zizmor = "1.25.2"
gitleaks = "8.30.1"
lefthook = "2.1.9"

[tasks.setup]
description = "Initial project setup"
run = ["mise install", "lefthook install", "pnpm install --frozen-lockfile"]

[tasks.yamllint]
description = "Lint YAML files"
raw_args = true
run = "uvx --python-preference only-managed yamllint==1.38.0"

[tasks."db:up"]
description = "Start the PostgreSQL container"
run = "docker compose up -d"

[tasks."db:down"]
description = "Stop the PostgreSQL container"
run = "docker compose down"

[tasks."db:logs"]
description = "Tail PostgreSQL logs"
run = "docker compose logs -f postgres"
