commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks git --pre-commit --staged
    biome:
      run: pnpm exec biome check --staged --no-errors-on-unmatched
    markdownlint:
      glob: "*.md"
      run: pnpm exec markdownlint-cli2 {staged_files}
    yamllint:
      glob: "*.{yml,yaml}"
      run: yamllint --strict {staged_files}
    taplo:
      glob: "*.toml"
      run: pnpm exec taplo fmt --check {staged_files}

pre-push:
  commands:
    gitleaks:
      run: gitleaks git --log-opts "origin/main..HEAD"
